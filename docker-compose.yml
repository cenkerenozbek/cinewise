services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - ./shared:/app/shared
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  worker:
    build: ./worker
    env_file: .env
    depends_on:
      - mongo
    volumes:
      - ./worker:/app
      - ./shared:/app/shared
    restart: unless-stopped

volumes:
  mongo_data:
