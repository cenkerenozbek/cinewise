services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - ./shared:/app/shared
      - nlp_artifacts:/artifacts
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  worker:
    build: ./worker
    env_file: .env
    environment:
      - TMDB_TARGET_COUNT=20000
      - SEED_USER_LIMIT=2000
      - MOVIELENS_DIR=/data/movielens/ml-20m
    depends_on:
      - mongo
    volumes:
      - ./worker:/app
      - ./shared:/app/shared
      - nlp_artifacts:/artifacts
      - ./data/movielens:/data/movielens:ro
    restart: unless-stopped

volumes:
  mongo_data:
  nlp_artifacts:
