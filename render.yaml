services:
  - type: web
    name: cinewise-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ARTIFACTS_DIR
        value: /artifacts
      - key: DB_NAME
        value: movie_mrs
