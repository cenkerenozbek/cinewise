name: Keep Render Alive

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cinewise.onrender.com/api/health)
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: backend returned $STATUS"
            exit 1
          fi
